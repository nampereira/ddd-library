spring.application.name=library
spring.profiles.default=dev

# Safe default: never drop/recreate schema unless a profile explicitly sets create/create-drop.
spring.jpa.hibernate.ddl-auto=none

spring.datasource.url=jdbc:h2:file:./data/library
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# H2 console and SQL debug logging are enabled per-profile (see application-dev.properties).
spring.h2.console.enabled=false

security.jwt.expiration-ms=3600000

# HTTP client timeouts for all RestClient instances (OpenLibrary, webhook).
# Spring Boot applies these to the auto-configured ClientHttpRequestFactory.
spring.http.client.connect-timeout=5s
spring.http.client.read-timeout=10s

catalog.openlibrary.base-url=https://openlibrary.org/

# Webhook URL for loan event notifications (LoanCreated / LoanClosed).
# Leave blank to disable. Use a free Pipedream RequestBin URL for demos:
# https://pipedream.com/requestbin
notifications.webhook-url=

# JWT secret is profile-specific:
#   dev  → application-dev.properties  (hardcoded, safe to commit)
#   prod → application-prod.properties (requires JWT_SECRET environment variable)
